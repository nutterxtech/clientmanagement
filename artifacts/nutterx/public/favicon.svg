<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="128" y1="0" x2="128" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fefcf0"/>
      <stop offset="50%"  stop-color="#fffef5"/>
      <stop offset="100%" stop-color="#f9f0d0"/>
    </linearGradient>
    <linearGradient id="ro" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f5d878"/>
      <stop offset="40%"  stop-color="#c89000"/>
      <stop offset="100%" stop-color="#e8b420"/>
    </linearGradient>
    <linearGradient id="ri" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e8b420"/>
      <stop offset="100%" stop-color="#c89000"/>
    </linearGradient>
    <linearGradient id="ng" x1="128" y1="72" x2="128" y2="184" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e8b420"/>
      <stop offset="50%"  stop-color="#c89000"/>
      <stop offset="100%" stop-color="#7a5200"/>
    </linearGradient>
    <clipPath id="circ">
      <circle cx="128" cy="128" r="121"/>
    </clipPath>
  </defs>

  <!-- Parchment background, clipped to circle -->
  <circle cx="128" cy="128" r="121" fill="url(#bg)"/>

  <!-- Outer gold ring -->
  <circle cx="128" cy="128" r="121" fill="none" stroke="url(#ro)" stroke-width="6"/>

  <!-- Inner accent ring -->
  <circle cx="128" cy="128" r="112" fill="none" stroke="url(#ri)" stroke-width="1.2" opacity="0.55"/>

  <!-- Bold N — smaller, centred (height ~112px, width ~80px in 256 viewbox) -->
  <!-- Left vertical bar -->
  <rect x="88" y="72" width="18" height="112" rx="4" fill="url(#ng)"/>
  <!-- Right vertical bar -->
  <rect x="150" y="72" width="18" height="112" rx="4" fill="url(#ng)"/>
  <!-- Diagonal stroke -->
  <polygon points="88,72 106,72 168,184 150,184" fill="url(#ng)"/>
</svg>
